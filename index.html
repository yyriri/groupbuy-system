<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>谷子拼团系统</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }
        #products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .box {
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .box img {
            width: 100%;
            height: 180px;
            object-fit: contain;
        }
        input {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>


<div id="products"></div>

<script>

async function loadProduct() {

    const res = await fetch("http://localhost:3000/products");
    const products = await res.json();

    const container = document.getElementById("products");

    container.innerHTML = "";

    products.forEach(product => {

        container.innerHTML += `
            <div class="box">

                <img src="./images/product${product.id}.jpg" width="150">

                <h2 data-original="${product.name}">
                    ${product.name}
                </h2>

                <p data-original="库存：${product.stock}">
                    库存：${product.stock}
                </p>

                <input
                    id="name-${product.id}"
                    placeholder="购买人姓名"
                    data-original-placeholder="购买人姓名"
                >

                <input
                    id="qty-${product.id}"
                    type="number"
                    placeholder="数量"
                    data-original-placeholder="数量"
                >

                <button onclick="buy(${product.id})" data-original="购买(ID:${product.id})">
                    购买(ID:${product.id})
                </button>

                <p id="msg-${product.id}"></p>

            </div>
        `;
    });
}

async function buy(productId) {

    console.log("购买商品ID:", productId);

    const name =
        document.getElementById(`name-${productId}`).value;

    const qty =
        document.getElementById(`qty-${productId}`).value;

    console.log("购买数量:", qty);

    const res = await fetch("http://localhost:3000/buy", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            buyer_name: name,
            quantity: Number(qty),
            product_id: productId
        })
    });

    const data = await res.json();

    document.getElementById(
        `msg-${productId}`
    ).innerText = data.message;



}
loadProduct();
</script>

</body>
</html>
